<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Aggressive fix for Firebase SDK trying to overwrite window.fetch in restricted environments (iframes)
      (function() {
        console.log('WOODY: Applying window.fetch protection...');
        try {
          if (typeof window !== 'undefined' && window.fetch) {
            const originalFetch = window.fetch;
            
            // Try to define it on the window object directly
            try {
              Object.defineProperty(window, 'fetch', {
                get: function() { return originalFetch; },
                set: function() { 
                  console.warn('WOODY: Blocked attempt to overwrite window.fetch');
                },
                configurable: true,
                enumerable: true
              });
              console.log('WOODY: window.fetch protected successfully.');
            } catch (e) {
              console.warn('WOODY: Could not define fetch on window, trying prototype...', e);
              
              // Fallback: try to define it on the prototype if window is locked
              try {
                const proto = Object.getPrototypeOf(window);
                if (proto) {
                  Object.defineProperty(proto, 'fetch', {
                    get: function() { return originalFetch; },
                    set: function() { 
                      console.warn('WOODY: Blocked attempt to overwrite window.fetch (prototype)');
                    },
                    configurable: true,
                    enumerable: true
                  });
                  console.log('WOODY: window.fetch protected on prototype.');
                }
              } catch (e2) {
                console.error('WOODY: Failed to protect window.fetch:', e2);
              }
            }
          }
        } catch (e) {
          console.error('WOODY: Critical error in fetch protection:', e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
